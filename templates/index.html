<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WSI Patch Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        #left-panel {
            width: 55%;
            min-width: 500px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 10px;
            background: #fafafa;
        }

        #patch-map-row {
            flex: 1;
            display: flex;
            gap: 10px;
            min-height: 500px;
        }

        #patch-map-container {
            flex: 1;
            border: 1px solid #ddd;
            background: white;
            overflow: hidden;
            touch-action: none;
            padding: 0;
        }

        #patch-map {
            width: 100%;
            height: 100%;
            display: block;
            background: white;
            touch-action: none;
        }
        
        #colorbar-container {
            height: 90px;
            border: 1px solid #ddd;
            background: white;
            margin-bottom: 10px;
            padding: 8px 10px 14px 10px;
            box-sizing: border-box;
            overflow: visible;
        }

        #colorbar {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        /* #patch-info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            min-height: 60px;
        } */

        #viewer-container {
            flex: 1;
            position: relative;
        }

        #openseadragon {
            width: 100%;
            height: 100%;
        }

        #annotation-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #case-selector-card {
            border: 1px solid #ddd;
            background: white;
            padding: 10px;
            margin-bottom: 10px;
        }

        #case-select {
            width: 100%;
            margin-top: 6px;
            margin-bottom: 10px;
            padding: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }

        #case-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            font-size: 14px;
            line-height: 1.4;
            align-items: center;
        }

        .case-meta-item {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="left-panel">
        <div id="case-selector-card">
            <label for="case-select"><strong>Select WSI</strong></label>
            <select id="case-select"></select>
            <div id="case-meta"></div>
        </div>
        <h3>Patch cosine similarity map</h3>

        <div id="colorbar-container">
            <svg id="colorbar"></svg>
        </div>

        <div id="patch-map-container">
            <svg id="patch-map" preserveAspectRatio="xMidYMid meet"></svg>
        </div>

        <!-- <div id="patch-info">Click a patch</div> -->
    </div>

    <div id="viewer-container">
        <div id="openseadragon"></div>
        <svg id="annotation-overlay"></svg>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="/static/main.js"></script>
</body>

</html>
