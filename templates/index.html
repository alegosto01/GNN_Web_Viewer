<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WSI Patch Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        #left-panel {
            width: 42%;
            min-width: 360px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 10px;
            background: #fafafa;
        }

        #patch-map-container {
            flex: 1;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #patch-map {
            width: 100%;
            height: 100%;
            display: block;
            background: #f7f7f7;
        }

        #patch-info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            min-height: 60px;
        }

        #viewer-container {
            flex: 1;
            position: relative;
        }

        #openseadragon {
            width: 100%;
            height: 100%;
        }

        #annotation-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="left-panel">
        <h3>Patch cosine similarity map</h3>
        <div id="patch-map-container">
            <svg id="patch-map" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div id="patch-info">Click a patch</div>
    </div>

    <div id="viewer-container">
        <div id="openseadragon"></div>
        <svg id="annotation-overlay"></svg>
    </div>

    <script src="/static/main.js"></script>
</body>

</html>
